<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="enot" content="c2e0ba4c" />
  <title>Vanta Visuals — Вход</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo">Vanta Visuals</a>
      <nav class="nav">
        <a href="index.html" class="nav-link">Главная</a>
        <a href="facts.html" class="nav-link">Факты</a>
        <a href="buy.html" class="nav-link">Купить</a>
      </nav>
      <a href="login.html" class="btn btn-outline">Войти</a>
    </div>
  </header>

  <main>
    <section class="auth-section">
      <div class="container">
        <div class="auth-card">
        <div class="auth-tabs">
          <button class="tab-btn active" data-tab="login">Вход</button>
          <button class="tab-btn" data-tab="register">Регистрация</button>
        </div>
        <form id="loginForm" class="auth-form">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="your@email.com" required>
          </div>
          <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" placeholder="Введите пароль" required>
          </div>
          <button type="submit" class="btn btn-primary btn-full">Войти</button>
        </form>
        <form id="registerForm" class="auth-form" style="display:none">
          <div class="form-group">
            <label for="regName">Имя</label>
            <input type="text" id="regName" placeholder="Ваше имя" required>
          </div>
          <div class="form-group">
            <label for="regEmail">Email</label>
            <input type="email" id="regEmail" placeholder="your@email.com" required>
          </div>
          <div class="form-group">
            <label for="regPassword">Пароль</label>
            <input type="password" id="regPassword" placeholder="Придумайте пароль" required>
          </div>
          <button type="submit" class="btn btn-primary btn-full">Зарегистрироваться</button>
        </form>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Vanta Visuals. Все права защищены.</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
